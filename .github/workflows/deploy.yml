# main ブランチに push されるたびに、自動でビルドして GitHub Pages に公開する。
# 管理画面(Sveltia CMS)で「保存」→ GitHub に commit → このワークフローが走る、という流れ。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可能にしておく

# GitHub Pages への書き込みに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に走らないように直列化（最新の push を優先）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 依存関係をインストール
        run: npm ci

      - name: ビルド
        run: npm run build

      - name: Pages 用にアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へ公開
        id: deployment
        uses: actions/deploy-pages@v4
